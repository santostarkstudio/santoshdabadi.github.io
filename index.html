<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Santosha Dabadi Aiyyanna — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { theme: { extend: {
  fontFamily: { sans:['Inter','ui-sans-serif','system-ui'], mono:['JetBrains Mono','ui-monospace'] },
  colors: { ink:'#0a0a0f', panel:'#111118', line:'#1f1f2b', muted:'#8b8ba7', accent:'#7c5cff', accent2:'#22d3ee' }
}}}
</script>
<style>
  html { scroll-behavior: smooth; }
  body { color:#e6e6f0; position:relative; min-height:100vh; }
  body::before { content:""; position:fixed; inset:0; z-index:-2; background-image: url("https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=2000&q=80"); background-size:cover; background-position:center; background-attachment:fixed; filter: blur(2px) brightness(0.35) saturate(1.1); opacity: 0.55; }
  body::after { content:""; position:fixed; inset:0; z-index:-1; background: radial-gradient(1200px 600px at 80% -10%, rgba(124,92,255,.28), transparent 60%), radial-gradient(900px 500px at -10% 30%, rgba(34,211,238,.18), transparent 60%), linear-gradient(180deg, rgba(10,10,15,.55), rgba(10,10,15,.85)); }
  .grid-bg { background-image: linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px); background-size: 44px 44px; mask-image: radial-gradient(ellipse at top, black 40%, transparent 75%); }
  .glass { background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)); border: 1px solid rgba(255,255,255,.06); backdrop-filter: blur(10px); }
  .gradient-text { background: linear-gradient(90deg,#fff 0%, #c9c2ff 50%, #88e6ff 100%); -webkit-background-clip:text; background-clip:text; color: transparent; }
  .card-hover { transition: transform .5s cubic-bezier(.2,.8,.2,1); }
  .card-hover:hover { transform: translateY(-6px) rotateX(4deg) rotateY(-4deg) scale(1.02); }
</style>
</head>
<body class="font-sans antialiased selection:bg-accent/40 selection:text-white">

<header class="sticky top-0 z-50 backdrop-blur-md bg-ink/70 border-b border-line/60">
  <nav class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="#top" class="flex items-center gap-2 font-semibold">
      <span id="brandAvatar" class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-gradient-to-br from-accent to-accent2 text-ink font-bold overflow-hidden">S</span>
      <span id="brandName">Santosha Dabadi Aiyyanna</span>
    </a>
    <ul class="hidden md:flex items-center gap-6 text-sm text-muted">
      <li><a href="#about" class="hover:text-white">About</a></li>
      <li><a href="#projects" class="hover:text-white">Projects</a></li>
      <li><a href="#contact" class="hover:text-white">Contact</a></li>
    </ul>
    <button id="lockBtn" class="text-xs px-3 py-1.5 rounded-md border border-line text-muted hover:text-white">Admin Login</button>
  </nav>
</header>

<main class="max-w-6xl mx-auto px-6 py-20">
  <section id="top" class="mb-20">
    <div class="flex flex-col md:flex-row items-center gap-10">
      <div id="profilePhoto" class="w-36 h-36 rounded-full bg-accent/20 border-2 border-white/10 flex items-center justify-center text-5xl font-bold">S</div>
      <div>
        <div id="heroBadge" class="text-xs font-mono text-muted chip rounded-full px-3 py-1 mb-6 inline-block border border-line">Open to opportunities · 2026</div>
        <h1 id="heroHeadline" class="text-6xl font-extrabold gradient-text">Computer Science student</h1>
        <p id="heroBio" class="mt-6 text-lg text-muted">Loading...</p>
      </div>
    </div>
  </section>

  <section id="about" class="py-10 border-t border-line/60" data-section="about"></section>
  <section id="projects" class="py-10 border-t border-line/60" data-section="projects"></section>
  <section id="contact" class="py-10 border-t border-line/60" data-section="contact"></section>
</main>

<script>
/* CLOUD DATABASE CONFIGURATION */
const SUPABASE_URL = "https://eaaavmyeqrrdyftzulbk.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhYWF2bXllcXJyZHlmdHp1bGJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMjY5NDgsImV4cCI6MjA5NzcwMjk0OH0.Db9kj3_jL6l81_SeI7WakAJs1AercwtxIOPsufIcXcE";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const SECRET_HASH = "240d1dfb47e2b834e56598c2ca893b8f192b347b7a695b28da35cd58db31b349";

let state = { items: [], editMode: false, profile: {} };

const $ = (s) => document.querySelector(s);
async function syncFromCloud() {
  const { data: profile } = await supabase.from('profile_data').select('*').eq('id', 'main_user').single();
  if (profile) {
    state.profile = profile;
    $('#brandName').textContent = profile.name;
    $('#heroHeadline').textContent = profile.headline;
    $('#heroBio').textContent = profile.bio;
  }
  const { data: items } = await supabase.from('portfolio_items').select('*');
  if (items) { state.items = items; render(); }
}

function render() {
  document.body.classList.toggle('edit-mode', state.editMode);
  // Simple auto-render loop for sections
  ['about', 'projects', 'contact'].forEach(sec => {
    const items = state.items.filter(i => i.section === sec);
    $(`#${sec}`).innerHTML = `<h2 class="text-3xl font-bold mb-6">${sec.toUpperCase()}</h2>` + 
      items.map(i => `<div class="glass p-5 rounded-xl mb-4">${i.title}<p class="text-muted text-sm">${i.body}</p></div>`).join('');
  });
}

$('#lockBtn').addEventListener('click', async () => {
  if (state.editMode) { state.editMode = false; render(); }
  else {
    const pass = prompt("Enter Admin Password:");
    const encoder = new TextEncoder();
    const data = await crypto.subtle.digest('SHA-256', encoder.encode(pass));
    const hash = Array.from(new Uint8Array(data)).map(b => b.toString(16).padStart(2, '0')).join('');
    if (hash === SECRET_HASH) { state.editMode = true; render(); }
  }
});

syncFromCloud();
</script>
</body>
</html>
